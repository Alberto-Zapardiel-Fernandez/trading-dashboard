<!DOCTYPE html>
<html lang="es" style="font-size: 12px">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Dashboard</title>
</head>

<body>
  <div id="root"></div>

  <!-- ↓ AÑADIR ESTO: recupera la ruta guardada por el 404.html -->
  <script>
    (function () {
      var ruta = sessionStorage.getItem('rutaRedirigida');
      if (ruta && ruta !== '/trading-dashboard/') {
        sessionStorage.removeItem('rutaRedirigida');
        // Reemplaza la URL sin recargar la página
        window.history.replaceState(null, null, ruta);
      }
    })();
  </script>
  <!-- ↑ FIN DEL AÑADIDO -->

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
